<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DİZİNATİON+</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Inter,Arial,sans-serif;background:#0b0b0f;color:#fff}
header{position:sticky;top:0;z-index:10;display:flex;justify-content:space-between;align-items:center;padding:18px 32px;background:linear-gradient(180deg,#000 0%,rgba(0,0,0,.6) 60%,transparent 100%)}
.logo{color:#e50914;font-weight:800;letter-spacing:1px;font-size:28px}

.hero{height:62vh;display:flex;align-items:flex-end;padding:40px;background-image:linear-gradient(to top,rgba(0,0,0,.85),rgba(0,0,0,.2)),url('https://picsum.photos/1600/800?blur=2');background-size:cover;background-position:center}
.hero h1{font-size:42px;margin:0 0 10px}
.hero p{max-width:520px;opacity:.9;margin:0 0 16px}
.hero button{background:#e50914;border:0;color:#fff;padding:12px 18px;border-radius:6px;cursor:pointer;font-weight:600}

.container{padding:24px 32px}
.section-title{font-size:20px;margin:10px 0 12px}
.row{display:flex;gap:14px;overflow-x:auto;padding-bottom:10px}
.card{min-width:180px;height:260px;border-radius:12px;background-size:cover;background-position:center;position:relative;cursor:pointer;transition:.25s}
.card:hover{transform:scale(1.08);box-shadow:0 10px 30px rgba(0,0,0,.7)}
.card .label{position:absolute;left:10px;bottom:10px;background:rgba(0,0,0,.7);padding:6px 10px;border-radius:6px;font-size:13px}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center}
.modal{width:min(1000px,92vw);max-height:86vh;overflow:auto;background:#111;border-radius:14px;padding:18px}
.modal h2{margin:0 0 10px}
.episodes{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}
.ep{background:#1a1a22;border-radius:8px;padding:10px;text-align:center;cursor:pointer}
.ep:hover{background:#262632}

.player{margin-top:14px}
video{width:100%;border-radius:10px}
.close{position:absolute;right:18px;top:14px;font-size:22px;cursor:pointer;opacity:.8}

footer{padding:24px 32px;opacity:.6}

.coming-soon{
  position:absolute;
  bottom:35px;
  left:10px;
  color:red;
  font-size:14px;
  font-weight:bold;
}
</style>
</head>

<body>
<header>
  <div class="logo">DİZİNATİON+</div>
</header>

<div class="hero">
  <div>
    <h1>Diziler</h1>
    <p>3 farklı dizi, toplam 24 bölüm. Tıkla, seç, izle.</p>
    <button onclick="openShow(0)">▶ Hemen İzle</button>
  </div>
</div>

<div class="container">
  <div class="section-title">Kütüphane</div>
  <div class="row" id="showsRow"></div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
  <div class="close" onclick="closeModal(); event.stopPropagation()">✖</div>
    <h2 id="showTitle"></h2>
    <div class="episodes" id="episodes"></div>

    <div class="player" id="player" style="display:none;">
      <iframe id="videoFrame" width="100%" height="500" frameborder="0" allow="autoplay" allowfullscreen></iframe>
    </div>

  </div>
</div>

<script>
// --- DİZİLER ---
const shows = [
  { title: 'Haymun Netre', cover: 'https://i.pinimg.com/736x/83/a8/27/83a827c150d20a357739fba925a6dcd9.jpg', count: 4 },
  { title: 'Vakkas Remastered', cover: 'https://i.pinimg.com/736x/f0/91/1d/f0911d27b0d9786a56825d064dcc660a.jpg', count: 2 },
  { title: 'Maniac Moruq', cover: 'https://i.pinimg.com/736x/cc/a5/bf/cca5bfa0349935f778e1ad623cf9d6cf.jpg', count: 18 },
  { title: 'Ehlen ve Sehlen', cover: 'https://i.pinimg.com/736x/f6/1b/68/f61b68fb66f7599915e69808065f84ea.jpg', count: 0 }
];

// --- DRIVE LİNKLERİ (BURAYA KENDİ LİNKLERİNİ KOY) ---
const videoLinks = {
  0: [
    "https://drive.google.com/file/d/1AuLFqTHe_5Ah81BFa5rHXYgXl5XJGmJt/view",
    "https://drive.google.com/file/d/1uxehFY7p0cRZLhitCVdHO9FYRx0GhUlw/view",
    "https://drive.google.com/file/d/19VVwtgQ8IqkAqs2IRVgdmJuTNrkd6Prc/view",
    "https://drive.google.com/file/d/19aZ9CJPQA77dSmnwr0IuM2XMkR7jUdmw/view"
  ],

  1: [
    "https://drive.google.com/file/d/1xNwF0Pr2Aoo4R8SEbewYHYxfX-BgaAzC/view",
    "https://drive.google.com/file/d/1WvzD4mIRz0ybPbNLrtQUswT4ISyAKJD4/view"
  ],

  2: [
    "https://drive.google.com/file/d/1vdFq3qGDzXqC920iS2yxozD4rBHuOnFP/view?usp=sharing",
    "https://drive.google.com/file/d/1agPDH3N-dVmjJNGzKYeZ81jCc9QwJ0fT/view?usp=sharing",
    "https://drive.google.com/file/d/1NPGg2rKgJmB2Zz4qKVdKlOLTIFZoOwPG/view?usp=sharing",
    "https://drive.google.com/file/d/1dOHeJnqTr8GpLzREy2yWbZl2DbPx1aSB/view?usp=sharing",
    "https://drive.google.com/file/d/1mZFl2rg0g68Z3eqeHPnQexD5A7kHqkIk/view?usp=sharing",
    "https://drive.google.com/file/d/17_eOxH1KBVB5GqaSHYUTyaqQXbkGlIWg/view?usp=sharing",
    "https://drive.google.com/file/d/180vKUYVOqMrSSQxPEXsfxHCIZzinXKRA/view?usp=sharing",
    "https://drive.google.com/file/d/1DSBD5hx4uR2GVqC6bhD0zMgWU6wHlFg8/view?usp=sharing",
    "https://drive.google.com/file/d/1V5zqzCv_FRtANmpiT_GY7dOkN_4SXYhb/view?usp=sharing",
    "https://drive.google.com/file/d/1YS0MPfUVVMzspKMp_VAwMrytlZ4Mz6qt/view?usp=sharing",
    "https://drive.google.com/file/d/1GPYjBmBgsZSJ0av25sqfhIhK7Ddwwpc7/view?usp=sharing",
    "https://drive.google.com/file/d/1LUzyhihbzeBH9-1W0p3ibj9LjqslMhAh/view?usp=sharing",
    "https://drive.google.com/file/d/1al971U8YzjjIt4F5HVrr84UhQP_aNg5H/view?usp=sharing",
    "https://drive.google.com/file/d/1sjVTbgxC4sI_dI1XyPYAdVObLU1lB2ZN/view?usp=sharing",
    "https://drive.google.com/file/d/1FfOzjFY_WtYndbzeKNp--1ZV1H0gk6c9/view?usp=sharing",
    "https://drive.google.com/file/d/1Vu3mH4qCeMkSK3wpj3u_YdmrrmDHsjgT/view?usp=sharing",
    "https://drive.google.com/file/d/18tTq5F5JrDbrU-omFeXKWawEyJB1UJdy/view?usp=sharing",
    "https://drive.google.com/file/d/XXXX18/view"
  ]
};
// --- UI ---
const row = document.getElementById('showsRow');

shows.forEach((s, i)=>{
  const el = document.createElement('div');
  el.className = 'card';
  el.style.backgroundImage = `url('${s.cover}')`;
  el.innerHTML = `<div class="label">${s.title}</div>`;

  if(s.title === "Ehlen ve Sehlen"){
    el.innerHTML += `<div class="coming-soon">Çok Yakında!</div>`;
  }

  el.onclick = ()=>openShow(i);
  row.appendChild(el);
});

function openShow(i){
  const s = shows[i];
  document.getElementById('overlay').style.display = 'flex';
  document.getElementById('showTitle').innerText = s.title + ` (${s.count} bölüm)`;

  const eps = document.getElementById('episodes');
  eps.innerHTML = '';

  for(let e=0;e<s.count;e++){
    const b = document.createElement('div');
    b.className = 'ep';
    b.innerText = `Bölüm ${e+1}`;
    b.onclick = ()=>play(i, e);
    eps.appendChild(b);
  }
}

function play(i, e){
  const link = videoLinks[i][e];

  const frame = document.getElementById('videoFrame');
  const player = document.getElementById('player');

  const embed = link.replace("/view","/preview");

  frame.src = embed;
  player.style.display = 'block';
}

function closeModal(){
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('videoFrame').src = "";
}
</script>

<footer>© 2026 DİZİNATİON+</footer>
</body>
</html>
